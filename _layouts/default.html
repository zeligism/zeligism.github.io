<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}
    {%- if page.custom_js -%}
      {%- for script in page.custom_js -%}
    <script src="{{ script | relative_url }}" defer></script>
      {%- endfor -%}
    {%- endif -%}

  </body>

</html>
